name: Sync PR to Notion

on:
  pull_request:
    branches:
      - master        # 👈 change this to your global branch name
    types: [opened, closed, reopened, synchronize]

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        if: github.event.action != 'closed'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm install

      - name: Run ESLint
        if: github.event.action != 'closed'
        run: |
          npm run lint || true
          npm run lint:json || true

      - name: Sync PR to Notion
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request.number;
            const prTitle  = context.payload.pull_request.title;
            const prUrl    = context.payload.pull_request.html_url;
            const author   = context.payload.pull_request.user.login;
            const branch   = context.payload.pull_request.head.ref;
            const openedAt = context.payload.pull_request.created_at;
            const isMerged = context.payload.pull_request.merged === true;
            const action   = context.payload.action;

            let status = "Open";
            if (action === "closed" && isMerged) status = "Merged";
            else if (action === "closed")        status = "Closed";

            const NOTION_TOKEN       = process.env.NOTION_TOKEN;
            const NOTION_DATABASE_ID = process.env.NOTION_DATABASE_ID;

            const headers = {
              "Authorization": `Bearer ${NOTION_TOKEN}`,
              "Content-Type":  "application/json",
              "Notion-Version": "2022-06-28"
            };

            // Search for existing page for this PR
            const searchRes = await fetch(`https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query`, {
              method: "POST",
              headers,
              body: JSON.stringify({
                filter: {
                  property: "PR Number",
                  number: { equals: prNumber }
                }
              })
            });
            const searchData = await searchRes.json();
            const existing = searchData.results?.[0];

            const properties = {
              "PR Title":   { title:  [{ text: { content: prTitle } }] },
              "PR Number":  { number: prNumber },
              "PR URL":     { url: prUrl },
              "Status":     { select: { name: status } },
              "Opened At":  { date: { start: openedAt } }
            };

            let eslintErrors = 0;
            let eslintWarnings = 0;

            if (fs.existsSync('lint-report.json')) {
              try {
                const lintReport = JSON.parse(fs.readFileSync('lint-report.json', 'utf8'));
                eslintErrors = lintReport.reduce((sum, file) => sum + (file.errorCount || 0), 0);
                eslintWarnings = lintReport.reduce((sum, file) => sum + (file.warningCount || 0), 0);
              } catch (err) {
                console.error("⚠️ Failed to parse ESLint report:", err);
              }
            }

            // Using collected counts locally for block mappings

            const tableBlock = {
              "object": "block",
              "type": "table",
              "table": {
                "table_width": 2,
                "has_column_header": true,
                "children": [
                  {
                    "type": "table_row",
                    "table_row": {
                      "cells": [
                        [ { "type": "text", "text": { "content": "Status Metric" } } ],
                        [ { "type": "text", "text": { "content": "Count" } } ]
                      ]
                    }
                  },
                  {
                    "type": "table_row",
                    "table_row": {
                      "cells": [
                        [ { "type": "text", "text": { "content": "ESLint Errors" } } ],
                        [ { "type": "text", "text": { "content": String(eslintErrors) } } ]
                      ]
                    }
                  },
                  {
                    "type": "table_row",
                    "table_row": {
                      "cells": [
                        [ { "type": "text", "text": { "content": "ESLint Warnings" } } ],
                        [ { "type": "text", "text": { "content": String(eslintWarnings) } } ]
                      ]
                    }
                  }
                ]
              }
            };

            if (existing) {
              // Update Properties
              const patchRes = await fetch(`https://api.notion.com/v1/pages/${existing.id}`, {
                method: "PATCH",
                headers,
                body: JSON.stringify({ properties })
              });
              if (!patchRes.ok) {
                console.error("❌ Notion Patch Error:", await patchRes.text());
              }

              // Delete the existing table block to ensure clean state tracking
              try {
                const blocksRes = await fetch(`https://api.notion.com/v1/blocks/${existing.id}/children`, { headers });
                if (blocksRes.ok) {
                  const blocksData = await blocksRes.json();
                  for (const block of (blocksData.results || [])) {
                    if (block.type === "table") {
                      await fetch(`https://api.notion.com/v1/blocks/${block.id}`, {
                        method: "DELETE",
                        headers
                      });
                    }
                  }
                }
              } catch (err) {
                console.error("⚠️ Failed to scrub old metrics tables:", err);
              }

              // Append the refreshed metrics Table
              const postRes = await fetch(`https://api.notion.com/v1/blocks/${existing.id}/children`, {
                method: "POST",
                headers,
                body: JSON.stringify({
                  children: [tableBlock]
                })
              });
              if (postRes.ok) {
                console.log(`✅ Updated Notion page for PR #${prNumber} → ${status}`);
              } else {
                console.error("❌ Notion Append Table Error:", await postRes.text());
              }
            } else {
              // Create Page with Table Body included
              const createRes = await fetch("https://api.notion.com/v1/pages", {
                method: "POST",
                headers,
                body: JSON.stringify({
                  parent: { database_id: NOTION_DATABASE_ID },
                  properties,
                  children: [tableBlock]
                })
              });
              if (createRes.ok) {
                console.log(`✅ Created Notion page for PR #${prNumber}`);
              } else {
                console.error("❌ Notion Create Page Error:", await createRes.text());
              }
            }

            // Explicitly excluded pipeline validation thresholds on request
        env:
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}