name: Sync PR to Notion

on:
  pull_request:
    branches:
      - master        # 👈 change this to your global branch name
    types: [opened, closed, reopened, synchronize]

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint:json

      - name: Sync PR to Notion
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = context.payload.pull_request.number;
            const prTitle  = context.payload.pull_request.title;
            const prUrl    = context.payload.pull_request.html_url;
            const author   = context.payload.pull_request.user.login;
            const branch   = context.payload.pull_request.head.ref;
            const openedAt = context.payload.pull_request.created_at;
            const isMerged = context.payload.pull_request.merged === true;
            const action   = context.payload.action;

            let status = "Open";
            if (action === "closed" && isMerged) status = "Merged";
            else if (action === "closed")        status = "Closed";

            const NOTION_TOKEN       = process.env.NOTION_TOKEN;
            const NOTION_DATABASE_ID = process.env.NOTION_DATABASE_ID;

            const headers = {
              "Authorization": `Bearer ${NOTION_TOKEN}`,
              "Content-Type":  "application/json",
              "Notion-Version": "2022-06-28"
            };

            // Search for existing page for this PR
            const searchRes = await fetch(`https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query`, {
              method: "POST",
              headers,
              body: JSON.stringify({
                filter: {
                  property: "PR Number",
                  number: { equals: prNumber }
                }
              })
            });
            const searchData = await searchRes.json();
            const existing = searchData.results?.[0];

            let eslintErrors = 0;
            let eslintWarnings = 0;
            try {
              if (fs.existsSync('lint-report.json')) {
                const lintReport = JSON.parse(fs.readFileSync('lint-report.json', 'utf8'));
                eslintErrors = lintReport.reduce((sum, file) => sum + (file.errorCount || 0), 0);
                eslintWarnings = lintReport.reduce((sum, file) => sum + (file.warningCount || 0), 0);
              }
            } catch (err) {
              console.error("⚠️ Failed to parse ESLint report:", err);
            }

            const properties = {
              "PR Title":   { title:  [{ text: { content: prTitle } }] },
              "PR Number":  { number: prNumber },
              "Author":     { rich_text: [{ text: { content: author } }] },
              "Branch":     { rich_text: [{ text: { content: branch } }] },
              "PR URL":     { url: prUrl },
              "Status":     { select: { name: status } },
              "Opened At":  { date: { start: openedAt } },
              "ESLint Errors": { number: eslintErrors },
              "ESLint Warnings": { number: eslintWarnings }
            };

            if (existing) {
              await fetch(`https://api.notion.com/v1/pages/${existing.id}`, {
                method: "PATCH",
                headers,
                body: JSON.stringify({ properties })
              });
              console.log(`✅ Updated Notion page for PR #${prNumber} → ${status}`);
            } else {
              await fetch("https://api.notion.com/v1/pages", {
                method: "POST",
                headers,
                body: JSON.stringify({
                  parent: { database_id: NOTION_DATABASE_ID },
                  properties
                })
              });
              console.log(`✅ Created Notion page for PR #${prNumber}`);
            }
        env:
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}