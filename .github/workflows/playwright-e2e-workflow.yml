name: ESLint Code Quality

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  eslint-check:
    name: Run ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Execute ESLint
        id: run_eslint
        run: |
          npm run lint:json || true
          
          if [ -f "lint-report.json" ]; then
            # Aggregate error and warning counts via jq
            ERRORS=$(jq '[.[].errorCount] | add | if . == null then 0 else . end' lint-report.json)
            WARNINGS=$(jq '[.[].warningCount] | add | if . == null then 0 else . end' lint-report.json)
            FILES=$(jq 'length' lint-report.json)
            
            # Folder-wise Breakdown
            FE_ERRORS=$(jq '[.[] | select(.filePath | contains("/front_end/")) | .errorCount] | add // 0' lint-report.json)
            FE_WARNINGS=$(jq '[.[] | select(.filePath | contains("/front_end/")) | .warningCount] | add // 0' lint-report.json)
            
            BE_ERRORS=$(jq '[.[] | select(.filePath | contains("/back_end/")) | .errorCount] | add // 0' lint-report.json)
            BE_WARNINGS=$(jq '[.[] | select(.filePath | contains("/back_end/")) | .warningCount] | add // 0' lint-report.json)
            
            TEST_ERRORS=$(jq '[.[] | select(.filePath | contains("/Test_cases/")) | .errorCount] | add // 0' lint-report.json)
            TEST_WARNINGS=$(jq '[.[] | select(.filePath | contains("/Test_cases/")) | .warningCount] | add // 0' lint-report.json)

            echo "========================================="
            echo "📊 ESLint Global Summary:"
            echo "📁 Total Files Scanned: $FILES"
            echo "❌ Total Errors:        $ERRORS"
            echo "⚠️ Total Warnings:      $WARNINGS"
            echo "========================================="
            echo "📂 Folder-wise Breakdown:"
            echo "🌐 Front-End:  ❌ $FE_ERRORS Errors, ⚠️ $FE_WARNINGS Warnings"
            echo "🖥️ Back-End:   ❌ $BE_ERRORS Errors, ⚠️ $BE_WARNINGS Warnings"
            echo "🧪 Test Cases: ❌ $TEST_ERRORS Errors, ⚠️ $TEST_WARNINGS Warnings"
            echo "========================================="
            
            if [ "$ERRORS" -gt 0 ]; then
              echo "🚨 FAILED: ESLint found $ERRORS errors across the monorepo!"
              exit 1
            fi
          else
            echo "🚨 CRITICAL ERROR: lint-report.json failed to generate."
            exit 1
          fi

      - name: Upload ESLint JSON Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-quality-report
          path: lint-report.json
          retention-days: 14