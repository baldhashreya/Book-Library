# .github/workflows/tests-lint.yml
name: Tests Lint

on:
  pull_request:
    paths:
      - 'tests/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            tests:
              - 'tests/**'

  lint-tests-playwright:
    needs: detect-changes
    if: needs.detect-changes.outputs.tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json
      - name: Install dependencies
        working-directory: tests
        run: npm ci
      - name: Lint Playwright (TypeScript)
        working-directory: tests
        run: npm run lint

  lint-tests-pytest:
    needs: detect-changes
    if: needs.detect-changes.outputs.tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff
      - name: Lint Pytest (Python)
        working-directory: tests
        run: ruff check .

  lint-tests-passed:
    runs-on: ubuntu-latest
    needs: [lint-tests-playwright, lint-tests-pytest]
    if: always()
    steps:
      - name: Check all test lint results
        run: |
          if [[ "${{ needs.lint-tests-playwright.result }}" == "failure" || \
                "${{ needs.lint-tests-pytest.result }}" == "failure" ]]; then
            echo "One or more test lint jobs failed!"
            exit 1
          fi
          echo "All test lint jobs passed or were skipped."